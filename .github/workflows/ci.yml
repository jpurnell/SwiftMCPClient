name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (Swift 6.2)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Verify Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (Swift 6.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'
      - name: Build
        run: swift build
      - name: Test
        run: swift test
