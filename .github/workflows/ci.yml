name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS (Swift 6.0)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Swift 6.0
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - name: Verify Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  linux:
    name: Linux (Swift 6.0)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
